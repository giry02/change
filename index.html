<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결합할인 - 프리미엄 로컬 버전</title>
    
    <!-- Libraries (Local-Friendly CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Pretendard';
            src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-SemiBold.woff') format('woff');
            font-weight: 600;
        }
        @font-face {
            font-family: 'Pretendard';
            src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Bold.woff') format('woff');
            font-weight: 700;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f3f5;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Premium Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(235, 238, 241, 0.5);
        }

        /* Modal Transitions */
        .modal-overlay {
            transition: opacity 0.3s ease-out;
        }
        .modal-content {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease-out;
        }
        .modal-enter { opacity: 1; pointer-events: auto; }
        .modal-exit { opacity: 0; pointer-events: none; }
        .modal-content-enter { transform: scale(1) translateY(0); opacity: 1; }
        .modal-content-exit { transform: scale(0.9) translateY(20px); opacity: 0; }

        /* Card Transitions */
        .card-expand-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-in-out;
            opacity: 0;
        }
        .card-expand-content.expanded {
            max-height: 500px;
            opacity: 1;
        }

        /* Hover Micro-interactions */
        .hover-scale {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hover-scale:hover {
            transform: scale(1.05);
        }
        .hover-scale:active {
            transform: scale(0.95);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f3f5; }
        ::-webkit-scrollbar-thumb { background: #dee2e6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #adb5bd; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3617ce',
                        primaryHover: '#2a12a5',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const svgPaths = {
            p17fe1c00: "M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z",
            p7819800: "M4 6H20M4 12H20M4 18H20",
            p15284300: "M6 18L18 6M6 6L18 18",
            p16abbb80: "M13 16V11M13 8V7.99M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z",
            p19c6c780: "M17 2H7C5.89543 2 5 2.89543 5 4V20C5 21.1046 5.89543 22 7 22H17C18.1046 22 19 21.1046 19 20V4C19 2.89543 18.1046 2 17 2ZM12 19C11.4477 19 11 18.5523 11 18C11 17.4477 11.4477 17 12 17C12.5523 17 13 17.4477 13 18C13 18.5523 12.5523 19 12 19Z",
            p3cadde00: "M19 9L12 16L5 9",
        };

        function ConsultationCard({ id, title, badge, description, price, dateRange, details, isExpanded, onToggle, showDetails }) {
            const [selectedPeriod, setSelectedPeriod] = useState("10년-20년 미만");

            return (
                <div className={`bg-white rounded-[24px] border-2 transition-all duration-300 overflow-hidden ${isExpanded ? 'border-primary shadow-xl shadow-primary/5' : 'border-gray-100 shadow-sm'}`}>
                    <div className="p-8">
                        <div className="flex items-start justify-between">
                            <div className="flex items-start gap-5">
                                <div className="w-12 h-12 bg-gradient-to-br from-primary to-[#5a3ae4] rounded-2xl flex items-center justify-center flex-shrink-0 mt-1 shadow-lg shadow-primary/20">
                                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                        <path d={svgPaths.p19c6c780} />
                                    </svg>
                                </div>
                                <div>
                                    <div className="flex items-center gap-3 mb-2">
                                        <h3 className="text-2xl font-bold tracking-tight">{title}</h3>
                                        {badge && (
                                            <span className="px-3 py-1 bg-[#f0efff] text-primary text-sm rounded-lg font-bold">
                                                {badge}
                                            </span>
                                        )}
                                    </div>
                                    <p className="text-lg text-gray-500 font-medium">{description}</p>
                                </div>
                            </div>
                            <div className="text-right">
                                {dateRange && <div className="text-base font-semibold text-gray-400 mb-2">{dateRange}</div>}
                                <div className="text-3xl font-black text-primary mb-1">
                                    {price}<span className="text-xl font-bold ml-1">원</span>
                                </div>
                                <div className="text-sm font-medium text-gray-400">{details}</div>
                            </div>
                        </div>

                        {showDetails && (
                            <div className={`card-expand-content ${isExpanded ? 'expanded' : ''}`}>
                                <div className="h-px bg-gray-100 my-8" />
                                <div className="bg-gray-50 rounded-2xl p-7 border border-gray-100">
                                    <h4 className="text-xl font-bold mb-3">인터넷 & Btv 결합 할인 계산기</h4>
                                    <p className="text-base text-gray-500 mb-6 leading-relaxed">
                                        결합 기간에 따라 할인 금액이 달라질 수 있습니다. <br/>하단의 기간을 선택하여 정확한 할인 혜택을 확인하세요.
                                    </p>
                                    <div className="flex flex-wrap gap-3">
                                        {["10년 미만", "10년-20년 미만", "20-30년 미만", "30년 이상"].map((period) => (
                                            <button
                                                key={period}
                                                onClick={() => setSelectedPeriod(period)}
                                                className={`px-5 py-3 rounded-xl text-base font-bold border transition-all ${selectedPeriod === period ? 'bg-primary text-white border-primary shadow-md shadow-primary/20' : 'bg-white text-gray-600 border-gray-200 hover:border-gray-400'}`}
                                            >
                                                {period}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {showDetails && (
                            <button onClick={onToggle} className="w-full flex items-center justify-center py-4 text-gray-400 hover:text-black transition-all mt-5 border-t border-gray-50">
                                <div style={{ transform: `rotate(${isExpanded ? 180 : 0}deg)`, transition: 'transform 0.3s' }}>
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                                        <path d={svgPaths.p3cadde00} />
                                    </svg>
                                </div>
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [selectedFilter, setSelectedFilter] = useState("2개");
            const [showModal, setShowModal] = useState(false);
            const [modalActive, setModalActive] = useState(false);
            const [expandedCard, setExpandedCard] = useState("card2");

            useEffect(() => {
                if (showModal) {
                    setTimeout(() => setModalActive(true), 10);
                } else {
                    setModalActive(false);
                }
            }, [showModal]);

            const filters = ["전체", "없음", "1개", "2개", "3개", "4개", "5개 이상"];

            return (
                <div className="min-h-screen flex flex-col items-center">
                    <header className="w-full h-24 glass sticky top-0 z-40 flex items-center justify-between px-10 shadow-sm">
                        <div className="flex items-center gap-8">
                            <div className="w-9 h-9 bg-black rounded-lg shadow-lg flex items-center justify-center cursor-pointer hover-scale">
                                <span className="text-white font-bold text-[10px]">SKT</span>
                            </div>
                            <nav className="flex gap-8">
                                {["진단서", "휴대폰·요금제", "인터넷·Btv", "T우주 구독"].map((item) => (
                                    <button 
                                        key={item}
                                        className={`text-xl transition-all relative pb-2 group ${item === "휴대폰·요금제" ? "text-black font-semibold" : "text-gray-500 hover:text-black"}`}
                                    >
                                        {item}
                                        {item === "휴대폰·요금제" && <div className="absolute bottom-0 left-0 right-0 h-1 bg-black rounded-full" />}
                                    </button>
                                ))}
                            </nav>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="relative group">
                                <input type="text" placeholder="010-1234-5678" className="w-52 h-12 px-4 pr-12 border border-gray-200 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-gray-50/50" />
                                <button className="absolute right-2 top-2 w-8 h-8 flex items-center justify-center hover:bg-white rounded-lg transition-colors">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                        <path d={svgPaths.p17fe1c00} />
                                    </svg>
                                </button>
                            </div>
                            <div className="w-12 h-12 bg-gradient-to-br from-gray-800 to-black rounded-full flex items-center justify-center text-white text-lg font-semibold shadow-md cursor-pointer hover-scale">홍</div>
                            <button className="w-8 h-8 text-gray-400 hover:text-black transition-colors">
                                <svg className="w-full h-full" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                    <path d={svgPaths.p7819800} />
                                </svg>
                            </button>
                        </div>
                    </header>

                    {showModal && (
                        <div className={`fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal-overlay ${modalActive ? 'modal-enter' : 'modal-exit'}`}>
                            <div className={`bg-white rounded-[32px] w-full max-w-[460px] p-10 relative shadow-2xl modal-content ${modalActive ? 'modal-content-enter' : 'modal-content-exit'}`}>
                                <button onClick={() => setShowModal(false)} className="absolute top-6 right-6 w-8 h-8 text-gray-400 hover:text-black transition-colors">
                                    <svg className="w-full h-full" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                        <path d={svgPaths.p15284300} />
                                    </svg>
                                </button>
                                <h2 className="text-3xl font-bold mb-6 tracking-tight">결합할인</h2>
                                <p className="text-xl text-gray-500 leading-relaxed mb-8">결합할인 상품에 대한 고객 관점의 <br/>친절한 설명이 이곳에 표시됩니다.</p>
                                <button onClick={() => setShowModal(false)} className="w-full py-4 bg-primary text-white rounded-xl font-semibold text-lg hover:bg-primaryHover transition-colors shadow-lg shadow-primary/20">확인</button>
                            </div>
                        </div>
                    )}

                    <main className="w-full max-w-[1440px] px-10 py-12">
                        <div className="max-w-[1268px] mx-auto">
                            <div className="flex items-end justify-between mb-10">
                                <div>
                                    <h1 className="text-5xl font-bold tracking-tight mb-2">결합할인</h1>
                                    <p className="text-gray-500 text-lg">나에게 맞는 결합 할인 상품을 찾아보세요.</p>
                                </div>
                                <button onClick={() => setShowModal(true)} className="text-primary font-semibold flex items-center gap-1 hover:underline">결합할인이란?</button>
                            </div>

                            <div className="mb-8 bg-white p-8 rounded-[24px] shadow-sm border border-gray-100 flex flex-col gap-6">
                                <div className="flex items-center gap-6">
                                    <span className="text-xl font-semibold text-gray-700 min-w-[100px]">결합 휴대 수</span>
                                    <div className="flex flex-wrap gap-2.5">
                                        {filters.map((filter) => (
                                            <button
                                                key={filter}
                                                onClick={() => setSelectedFilter(filter)}
                                                className={`px-6 py-3 rounded-xl border transition-all text-base font-medium ${selectedFilter === filter ? 'bg-primary text-white border-primary shadow-lg shadow-primary/20 scale-110' : 'bg-white text-gray-600 border-gray-200 hover:border-gray-400 hover:bg-gray-50'}`}
                                            >
                                                {filter}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="mb-6 flex items-center justify-between">
                                <span className="text-2xl font-bold">검색 결과 <span className="text-primary">5개</span></span>
                            </div>

                            <div className="mb-8 flex items-center gap-3 bg-orange-50 border border-orange-100 px-5 py-3 rounded-2xl inline-flex shadow-sm">
                                <div className="text-orange-500">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                        <path d={svgPaths.p16abbb80} />
                                    </svg>
                                </div>
                                <span className="text-base font-medium text-orange-900/80">30일 이내 기기변경 후 결합할인 전환 대상입니다.</span>
                            </div>

                            <div className="grid gap-6">
                                <ConsultationCard
                                    id="card1"
                                    title="요금가족결합"
                                    badge="이용중"
                                    description="온가족이 함께 누리는 무선 결합 할인 서비스"
                                    price="-34,000"
                                    details="인터넷 대상 -11,000원 ㅣ B tv 대상 -5,000원"
                                    isExpanded={expandedCard === "card1"}
                                    onToggle={() => setExpandedCard(expandedCard === "card1" ? null : "card1")}
                                />

                                <ConsultationCard
                                    id="card2"
                                    title="T+B인터넷(개인-패밀리형)"
                                    description="결합할인 상품에 대한 고객 관점의 친절한 설명"
                                    price="-22,000"
                                    dateRange="10년-20년 미만"
                                    details="인터넷 대상 -11,000원"
                                    isExpanded={expandedCard === "card2"}
                                    onToggle={() => setExpandedCard(expandedCard === "card2" ? null : "card2")}
                                    showDetails
                                />
                            </div>
                        </div>
                    </main>

                    <button className="fixed bottom-10 right-10 bg-primary text-white px-10 py-5 rounded-2xl text-xl font-bold shadow-2xl shadow-primary/40 z-30 hover-scale">
                        적용 (2)
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
